name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout gamlastan
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      # Several tests parse a real federation aggregate via
      # `include_str!(".../edugain-v2.xml")`, so the fixture must exist at the
      # workspace root before anything compiles test targets (clippy
      # --all-targets and test). Reuse the justfile recipe so the source URL
      # stays defined in one place.
      - name: Download eduGAIN metadata fixture
        run: just _ensure-edugain

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --verbose

      - name: Tests
        run: cargo test --workspace --verbose

  # HSM / PKCS#11 signing is exercised against a real SoftHSM2 token. The
  # integration test is `#[ignore]`d (it needs a provisioned token), so it is
  # invisible to the main `cargo test --workspace` run above; this job
  # provisions a throwaway token via the justfile and runs it explicitly.
  hsm-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout gamlastan
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-hsm-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install SoftHSM2 + PKCS#11 tooling
        run: just install-hsm-deps

      - name: HSM signing tests (SoftHSM2)
        run: just test-hsm
